{% extends "base.html" %}
{% block title %}Sign Up — SmartCart{% endblock %}

{% block content %}
<section class="container auth-page">
    <div class="auth-card wide">
        <h1>Create Account</h1>
        <p class="auth-sub">Join SmartCart and start shopping</p>

        <form method="post" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="full_name" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" placeholder="+92-300-0000000">
                </div>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" required minlength="6">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address_line" placeholder="Street, area">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" placeholder="Lahore">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg full-width">Create Account</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</section>
{% endblock %}
